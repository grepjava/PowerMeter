name: Release

# Triggered when a version tag is pushed: git tag v1.2.0 && git push origin v1.2.0
# Builds PowerMeter.exe + both ACSIL DLLs in Release|x64, assembles the
# distribution ZIP via package.ps1, and publishes a GitHub Release.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"        # v1.0.0, v1.2.3, etc.
      - "v[0-9]+.[0-9]+.[0-9]+-*"      # v1.0.0-rc1, v1.0.0-beta, etc.

permissions:
  contents: write       # required to create a GitHub Release and upload assets

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  release:
    name: Build & Publish Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # full history so package.ps1 / git describe works

      # ── Parse version from tag ──────────────────────────────────────────
      - name: Parse version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"          # e.g. v1.2.0
          $ver = $tag -replace '^v', ''            # e.g. 1.2.0
          Write-Host "Tag: $tag  Version: $ver"
          "tag=$tag"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      # ── Build PowerMeter.exe ────────────────────────────────────────────
      - name: Build PowerMeter.exe (Release x64)
        run: |
          msbuild PowerMeter.vcxproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /v:minimal `
            /nologo
        working-directory: PowerMeter

      # ── Build ACSIL DLLs ────────────────────────────────────────────────
      # Release output path normally targets C:\SierraChart\Data\.
      # We redirect it to a local staging directory so no SC install is needed.
      - name: Create SC stub directories
        shell: pwsh
        run: |
          $stub = "${{ github.workspace }}\PowerMeter\sc_stub"
          New-Item -ItemType Directory -Force "$stub\ACS_Source" | Out-Null
          New-Item -ItemType Directory -Force "$stub\Data"       | Out-Null

      - name: Download Sierra Chart ACS_Source headers
        shell: pwsh
        run: |
          $dest = "${{ github.workspace }}\PowerMeter\sc_stub\ACS_Source"
          $base = "https://www.sierrachart.com/ACS_Source"
          $files = @(
            "sierrachart.h",
            "SCStructures.h",
            "SCDateTime.h"
          )
          foreach ($f in $files) {
            $url = "$base/$f"
            $out = "$dest\$f"
            Write-Host "Downloading $url"
            Invoke-WebRequest -Uri $url -OutFile $out -UseBasicParsing
          }
          Write-Host "Headers downloaded to $dest"

      - name: Build PowerMeterFeed_64.dll (Release x64)
        run: |
          msbuild PowerMeterFeed.vcxproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:SierraChartRoot="${{ github.workspace }}\PowerMeter\sc_stub" `
            /v:minimal `
            /nologo
        working-directory: PowerMeter\ACSIL

      - name: Build PowerMeterFeedJS_64.dll (Release x64)
        run: |
          msbuild PowerMeterFeedJS.vcxproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:SierraChartRoot="${{ github.workspace }}\PowerMeter\sc_stub" `
            /v:minimal `
            /nologo
        working-directory: PowerMeter\ACSIL

      # ── Smoke-test all three binaries ────────────────────────────────────
      - name: Smoke test — all binaries are valid AMD64 PE images
        shell: pwsh
        run: |
          $stub = "${{ github.workspace }}\PowerMeter\sc_stub"

          $exeCandidates = @(
            "PowerMeter\PowerMeter\x64\Release\PowerMeter.exe",
            "PowerMeter\x64\Release\PowerMeter.exe"
          )
          $exe = $exeCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $exe) { Write-Error "PowerMeter.exe not found"; exit 1 }

          $binaries = @(
            $exe,
            "$stub\Data\PowerMeterFeed_64.dll",
            "$stub\Data\PowerMeterFeedJS_64.dll"
          )
          foreach ($bin in $binaries) {
            if (-not (Test-Path $bin)) {
              Write-Error "Binary not found: $bin"; exit 1
            }
            $bytes    = [System.IO.File]::ReadAllBytes($bin)
            if ($bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) {
              Write-Error "Invalid MZ header: $bin"; exit 1
            }
            $peOffset = [BitConverter]::ToInt32($bytes, 0x3C)
            $machine  = [BitConverter]::ToUInt16($bytes, $peOffset + 4)
            if ($machine -ne 0x8664) {
              Write-Error ("Not AMD64 (0x{0:X4}): $bin" -f $machine); exit 1
            }
            Write-Host ("PASS: $(Split-Path $bin -Leaf)  ({0:N0} bytes)" -f (Get-Item $bin).Length)
          }

      # ── Assemble distribution ZIP ────────────────────────────────────────
      - name: Assemble distribution package
        id: package
        shell: pwsh
        run: |
          $ver    = "${{ steps.version.outputs.version }}"
          $stub   = "${{ github.workspace }}\PowerMeter\sc_stub"

          # Find exe
          $exeCandidates = @(
            "PowerMeter\PowerMeter\x64\Release\PowerMeter.exe",
            "PowerMeter\x64\Release\PowerMeter.exe"
          )
          $exe = $exeCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1

          # Build dist tree manually (package.ps1 needs a local SC install;
          # we replicate its logic here using the stub paths)
          $distDir = "PowerMeter\dist\PowerMeter_v$ver"
          $zipPath = "PowerMeter\dist\PowerMeter_v$ver.zip"

          foreach ($d in @(
            $distDir,
            "$distDir\ACSIL",
            "$distDir\ACSIL\src",
            "$distDir\docs"
          )) { New-Item -ItemType Directory -Force $d | Out-Null }

          Copy-Item $exe                                    "$distDir\PowerMeter.exe"
          Copy-Item "$stub\Data\PowerMeterFeed_64.dll"      "$distDir\ACSIL\"
          Copy-Item "$stub\Data\PowerMeterFeedJS_64.dll"    "$distDir\ACSIL\"
          Copy-Item "PowerMeter\PowerMeterFeed.cpp"         "$distDir\ACSIL\src\"
          Copy-Item "PowerMeter\PowerMeterFeedJS.cpp"       "$distDir\ACSIL\src\"
          Copy-Item "PowerMeter\build_acsil.ps1"            "$distDir\ACSIL\"
          Copy-Item "PowerMeter\docs\README.md"             "$distDir\README.md"
          Copy-Item "PowerMeter\docs\ALGORITHM_NOTES.md"    "$distDir\docs\"

          Compress-Archive -Path "$distDir\*" -DestinationPath $zipPath -Force
          Write-Host "Package: $zipPath"
          "zip_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # ── Generate release notes from git log ──────────────────────────────
      - name: Generate release notes
        id: notes
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          # Find the previous tag to bound the log
          $prevTag = git describe --tags --abbrev=0 "$tag^" 2>$null
          if ($prevTag) {
            $log = git log "$prevTag..$tag" --pretty=format:"- %s" --no-merges
          } else {
            $log = git log "$tag" --pretty=format:"- %s" --no-merges | Select-Object -First 20
          }
          $notes = @"
          ## What's changed
          $($log -join "`n")

          ## Installation
          1. Extract the ZIP.
          2. Copy ``ACSIL\PowerMeterFeed_64.dll`` (or ``PowerMeterFeedJS_64.dll``) to ``C:\SierraChart\Data\``.
          3. Run ``PowerMeter.exe``.
          4. Load the study in Sierra Chart: **Analysis → Add Custom Study → PowerMeter Feed**.

          See ``README.md`` inside the ZIP for full instructions.
          "@
          # Write to a temp file to avoid quoting issues with GITHUB_OUTPUT
          $notes | Out-File -FilePath "${{ github.workspace }}\release_notes.md" -Encoding utf8

      # ── Publish GitHub Release ───────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: PowerMeter ${{ steps.version.outputs.tag }}
          body_path: ${{ github.workspace }}\release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          files: ${{ steps.package.outputs.zip_path }}
