name: CI

# Runs on every push to any branch and on every pull request.
# Builds PowerMeter.exe (Release x64) and both ACSIL DLLs, then runs
# a set of smoke tests to verify the binaries are valid PE images and
# export the expected symbols / entry points.

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]      # releases are handled by release.yml
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  build-overlay:
    name: Build PowerMeter.exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build Release x64
        run: |
          msbuild PowerMeter.vcxproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /v:minimal `
            /nologo
        working-directory: PowerMeter

      # Locate the exe (VS puts it in x64\Release\ or PowerMeter\x64\Release\)
      - name: Locate PowerMeter.exe
        id: locate-exe
        shell: pwsh
        run: |
          $candidates = @(
            "PowerMeter\PowerMeter\x64\Release\PowerMeter.exe",
            "PowerMeter\x64\Release\PowerMeter.exe"
          )
          $found = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $found) {
            Write-Error "PowerMeter.exe not found after build."
            exit 1
          }
          Write-Host "Found: $found"
          "exe_path=$found" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # ── Smoke tests ──────────────────────────────────────────────────────
      - name: Smoke test — valid PE image
        shell: pwsh
        run: |
          $exe = "${{ steps.locate-exe.outputs.exe_path }}"
          $bytes = [System.IO.File]::ReadAllBytes($exe)
          # MZ header
          if ($bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) {
            Write-Error "Not a valid PE image (missing MZ header): $exe"
            exit 1
          }
          Write-Host "PASS: valid MZ/PE header"

      - name: Smoke test — binary is 64-bit
        shell: pwsh
        run: |
          $exe = "${{ steps.locate-exe.outputs.exe_path }}"
          $bytes = [System.IO.File]::ReadAllBytes($exe)
          # Read e_lfanew at offset 0x3C (4 bytes LE) to find PE header
          $peOffset = [BitConverter]::ToInt32($bytes, 0x3C)
          # Machine field is at PE+4, 2 bytes. 0x8664 = IMAGE_FILE_MACHINE_AMD64
          $machine = [BitConverter]::ToUInt16($bytes, $peOffset + 4)
          if ($machine -ne 0x8664) {
            Write-Error ("Expected AMD64 (0x8664), got 0x{0:X4}" -f $machine)
            exit 1
          }
          Write-Host "PASS: machine type AMD64"

      - name: Smoke test — minimum file size
        shell: pwsh
        run: |
          $exe = "${{ steps.locate-exe.outputs.exe_path }}"
          $size = (Get-Item $exe).Length
          if ($size -lt 50KB) {
            Write-Error "Binary suspiciously small: $size bytes"
            exit 1
          }
          Write-Host ("PASS: file size {0:N0} bytes" -f $size)

      - name: Upload overlay artifact
        uses: actions/upload-artifact@v4
        with:
          name: PowerMeter-exe
          path: ${{ steps.locate-exe.outputs.exe_path }}
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  build-acsil:
    name: Build ACSIL DLLs
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      # Sierra Chart's ACS_Source headers are required to compile the ACSIL DLLs.
      # They are publicly distributed by Sierra Chart.
      - name: Download Sierra Chart ACS_Source headers
        shell: pwsh
        run: |
          $dest = "${{ github.workspace }}\PowerMeter\sc_stub\ACS_Source"
          New-Item -ItemType Directory -Force $dest | Out-Null
          $base = "https://www.sierrachart.com/ACS_Source"
          $files = @(
            "sierrachart.h",
            "SCStructures.h",
            "SCDateTime.h"
          )
          foreach ($f in $files) {
            $url = "$base/$f"
            $out = "$dest\$f"
            Write-Host "Downloading $url"
            Invoke-WebRequest -Uri $url -OutFile $out -UseBasicParsing
          }
          Write-Host "Headers downloaded to $dest"

      # Build both DLLs in Debug|x64 (no SierraChart install needed;
      # Debug output goes to ACSIL\bin\x64\Debug\ not C:\SierraChart\Data\)
      - name: Build PowerMeterFeed DLL (Debug x64)
        run: |
          msbuild PowerMeterFeed.vcxproj `
            /p:Configuration=Debug `
            /p:Platform=x64 `
            /p:SierraChartRoot="${{ github.workspace }}\PowerMeter\sc_stub" `
            /v:minimal `
            /nologo
        working-directory: PowerMeter\ACSIL

      - name: Build PowerMeterFeedJS DLL (Debug x64)
        run: |
          msbuild PowerMeterFeedJS.vcxproj `
            /p:Configuration=Debug `
            /p:Platform=x64 `
            /p:SierraChartRoot="${{ github.workspace }}\PowerMeter\sc_stub" `
            /v:minimal `
            /nologo
        working-directory: PowerMeter\ACSIL

      - name: Smoke test — Feed DLL is valid 64-bit PE
        shell: pwsh
        run: |
          $dlls = @(
            "PowerMeter\ACSIL\bin\x64\Debug\PowerMeterFeed_64_d.dll",
            "PowerMeter\ACSIL\bin\x64\Debug\PowerMeterFeedJS_64_d.dll"
          )
          foreach ($dll in $dlls) {
            if (-not (Test-Path $dll)) {
              Write-Error "DLL not found: $dll"; exit 1
            }
            $bytes   = [System.IO.File]::ReadAllBytes($dll)
            if ($bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) {
              Write-Error "Not a valid PE image: $dll"; exit 1
            }
            $peOffset = [BitConverter]::ToInt32($bytes, 0x3C)
            $machine  = [BitConverter]::ToUInt16($bytes, $peOffset + 4)
            if ($machine -ne 0x8664) {
              Write-Error ("$dll is not AMD64 (machine=0x{0:X4})" -f $machine); exit 1
            }
            $size = (Get-Item $dll).Length
            if ($size -lt 10KB) {
              Write-Error "DLL suspiciously small: $size bytes ($dll)"; exit 1
            }
            Write-Host ("PASS: $dll  ({0:N0} bytes, AMD64)" -f $size)
          }

      - name: Smoke test — Feed DLL exports scsf_PowerMeterFeed
        shell: pwsh
        run: |
          $dll = "PowerMeter\ACSIL\bin\x64\Debug\PowerMeterFeed_64_d.dll"
          $exports = dumpbin /exports $dll 2>&1
          if ($exports -notmatch "scsf_PowerMeterFeed") {
            Write-Error "Export 'scsf_PowerMeterFeed' not found in $dll"
            Write-Host $exports
            exit 1
          }
          Write-Host "PASS: scsf_PowerMeterFeed exported"

      - name: Smoke test — FeedJS DLL exports scsf_PowerMeterFeedJS
        shell: pwsh
        run: |
          $dll = "PowerMeter\ACSIL\bin\x64\Debug\PowerMeterFeedJS_64_d.dll"
          $exports = dumpbin /exports $dll 2>&1
          if ($exports -notmatch "scsf_PowerMeterFeedJS") {
            Write-Error "Export 'scsf_PowerMeterFeedJS' not found in $dll"
            Write-Host $exports
            exit 1
          }
          Write-Host "PASS: scsf_PowerMeterFeedJS exported"

      - name: Upload ACSIL artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ACSIL-debug-dlls
          path: PowerMeter/ACSIL/bin/x64/Debug/*.dll
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # Summary job — makes it easy to set a single branch protection rule
  ci-passed:
    name: CI passed
    needs: [build-overlay, build-acsil]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [[ "${{ needs.build-overlay.result }}" != "success" || \
                "${{ needs.build-acsil.result }}"  != "success" ]]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed."
